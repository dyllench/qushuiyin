<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频去水印</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", system-ui, sans-serif;
         max-width: 760px; margin: 0 auto; padding: 24px; color: #1d1d1f;
         background: #f5f5f7; }
  h1 { font-size: 22px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin: 16px 0;
          box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .muted { color: #86868b; font-size: 13px; }
  button { background: #0071e3; color: #fff; border: 0; border-radius: 8px;
           padding: 10px 18px; font-size: 15px; cursor: pointer; }
  button:disabled { background: #b0b0b5; cursor: not-allowed; }
  button.secondary { background: #e8e8ed; color: #1d1d1f; }
  input[type=file] { font-size: 14px; }
  label { font-size: 14px; margin-right: 14px; }
  #stage { position: relative; display: inline-block; cursor: crosshair;
           touch-action: none; max-width: 100%; }
  #frame { display: block; max-width: 100%; border-radius: 8px; }
  #box { position: absolute; border: 2px solid #ff3b30;
         background: rgba(255,59,48,.15); display: none; pointer-events: none; }
  .row { margin: 10px 0; }
  progress { width: 100%; height: 14px; }
  video { max-width: 100%; border-radius: 8px; margin-top: 10px; }
  .hidden { display: none; }
  a.dl { display: inline-block; margin-top: 10px; }
</style>
</head>
<body>
<h1>🎬 视频去水印</h1>
<p class="muted">上传视频 → 在画面上拖一个框圈住水印 → 开始处理 → 下载。框比水印略大一点效果更干净。</p>

<div class="card">
  <input type="file" id="file" accept="video/*">
  <div id="uploadHint" class="muted row">支持 mp4 / mov / mkv 等,最大 200MB。</div>
</div>

<div class="card hidden" id="editor">
  <div class="muted row">在下图上<strong>按住鼠标拖动</strong>圈出水印(可重画):</div>
  <div id="stage">
    <img id="frame" alt="视频首帧">
    <div id="box"></div>
  </div>
  <div class="row">
    <label><input type="radio" name="method" value="delogo" checked> 快速(delogo)</label>
    <label><input type="radio" name="method" value="inpaint"> 高质量(inpaint,较慢)</label>
  </div>
  <div class="row">
    <label><input type="checkbox" id="motion"> 水印会移动(逐帧追踪,较慢)</label>
  </div>
  <button id="go" disabled>开始去水印</button>
  <span id="boxInfo" class="muted"></span>
</div>

<div class="card hidden" id="progressCard">
  <div class="row" id="statusText">处理中…</div>
  <progress id="bar" max="100" value="0"></progress>
</div>

<div class="card hidden" id="resultCard">
  <div class="row"><strong>✅ 处理完成</strong></div>
  <video id="resultVideo" controls></video>
  <div><a class="dl" id="dlLink"><button>⬇️ 下载成品</button></a></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let state = { videoId: null, scale: 1, box: null };  // box in display coords

// ---------- 上传 ----------
$("file").addEventListener("change", async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  $("uploadHint").textContent = "上传中…";
  const fd = new FormData();
  fd.append("file", f);
  try {
    const r = await fetch("/api/upload", { method: "POST", body: fd });
    if (!r.ok) throw new Error((await r.json()).detail || r.status);
    const d = await r.json();
    state.videoId = d.video_id;
    state.origW = d.width; state.origH = d.height;
    const img = $("frame");
    img.onload = () => { state.scale = img.clientWidth / d.width; };
    img.src = d.frame;
    $("uploadHint").textContent = `已上传:${d.width}×${d.height}${d.has_audio ? "(含音轨)" : ""}`;
    $("editor").classList.remove("hidden");
    resetResult();
  } catch (err) {
    $("uploadHint").textContent = "上传失败:" + err.message;
  }
});

// ---------- 拖框 ----------
const stage = $("stage"), boxEl = $("box");
let drawing = false, startX = 0, startY = 0;

function pos(ev) {
  const r = stage.getBoundingClientRect();
  const p = ev.touches ? ev.touches[0] : ev;
  return { x: p.clientX - r.left, y: p.clientY - r.top };
}
function startDraw(ev) {
  ev.preventDefault();
  drawing = true;
  const p = pos(ev); startX = p.x; startY = p.y;
  boxEl.style.display = "block";
  updateBox(startX, startY, 0, 0);
}
function moveDraw(ev) {
  if (!drawing) return;
  ev.preventDefault();
  const p = pos(ev);
  const x = Math.min(p.x, startX), y = Math.min(p.y, startY);
  updateBox(x, y, Math.abs(p.x - startX), Math.abs(p.y - startY));
}
function endDraw() {
  if (!drawing) return;
  drawing = false;
  const w = parseFloat(boxEl.style.width), h = parseFloat(boxEl.style.height);
  if (w < 8 || h < 8) { boxEl.style.display = "none"; return; }
  state.box = {
    x: parseFloat(boxEl.style.left), y: parseFloat(boxEl.style.top), w, h
  };
  $("go").disabled = false;
  const s = state.scale || 1;
  $("boxInfo").textContent =
    `原图坐标 ≈ ${Math.round(state.box.x / s)},${Math.round(state.box.y / s)},` +
    `${Math.round(w / s)},${Math.round(h / s)}`;
}
function updateBox(x, y, w, h) {
  boxEl.style.left = x + "px"; boxEl.style.top = y + "px";
  boxEl.style.width = w + "px"; boxEl.style.height = h + "px";
}
stage.addEventListener("mousedown", startDraw);
window.addEventListener("mousemove", moveDraw);
window.addEventListener("mouseup", endDraw);
stage.addEventListener("touchstart", startDraw, { passive: false });
stage.addEventListener("touchmove", moveDraw, { passive: false });
stage.addEventListener("touchend", endDraw);

// ---------- 处理 ----------
$("go").addEventListener("click", async () => {
  if (!state.box) return;
  const s = state.scale || 1;
  const region = [
    Math.round(state.box.x / s), Math.round(state.box.y / s),
    Math.round(state.box.w / s), Math.round(state.box.h / s)
  ];
  const method = document.querySelector("input[name=method]:checked").value;
  const motion = $("motion").checked;
  $("go").disabled = true;
  $("progressCard").classList.remove("hidden");
  resetResult();
  $("statusText").textContent = motion ? "追踪并处理中…" : "处理中…";
  $("bar").value = 0;

  try {
    const r = await fetch("/api/process", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        video_id: state.videoId, regions: [region],
        method, motion, tracker: "template"
      })
    });
    if (!r.ok) throw new Error((await r.json()).detail || r.status);
    const { job_id } = await r.json();
    poll(job_id);
  } catch (err) {
    $("statusText").textContent = "出错:" + err.message;
    $("go").disabled = false;
  }
});

function poll(jobId) {
  const timer = setInterval(async () => {
    const r = await fetch("/api/jobs/" + jobId);
    const d = await r.json();
    $("bar").value = d.progress || 0;
    if (d.status === "done") {
      clearInterval(timer);
      $("statusText").textContent = "完成!";
      const url = "/api/download/" + jobId;
      $("resultVideo").src = url;
      $("dlLink").href = url;
      $("resultCard").classList.remove("hidden");
      $("go").disabled = false;
    } else if (d.status === "error") {
      clearInterval(timer);
      $("statusText").textContent = "处理失败:" + (d.error || "未知错误");
      $("go").disabled = false;
    }
  }, 1000);
}

function resetResult() { $("resultCard").classList.add("hidden"); }
</script>
</body>
</html>
