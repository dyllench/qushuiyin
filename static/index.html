<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>去水印 · 视频 / 图片</title>
<style>
  :root {
    --bg: #f4f5fb;
    --card: #ffffff;
    --ink: #1a1a2e;
    --muted: #8a8aa3;
    --line: #ececf3;
    --brand: #6c5ce7;
    --brand-2: #a55eea;
    --brand-soft: #efeafe;
    --ok: #00b894;
    --danger: #e74c3c;
    --shadow: 0 10px 30px rgba(76, 60, 160, .08);
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    margin: 0; padding: 0 16px 60px; color: var(--ink);
    background: radial-gradient(1200px 500px at 50% -200px, #e9e4ff 0%, var(--bg) 60%);
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  header { text-align: center; padding: 40px 0 24px; }
  header h1 {
    font-size: 30px; margin: 0 0 8px;
    background: linear-gradient(90deg, var(--brand), var(--brand-2));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  header p { color: var(--muted); margin: 0; font-size: 14px; }

  .tabs { display: flex; gap: 6px; background: #fff; padding: 6px;
          border-radius: 14px; box-shadow: var(--shadow); margin: 0 auto 22px; max-width: 460px; }
  .tab { flex: 1; text-align: center; padding: 11px 0; border-radius: 10px;
         font-size: 15px; font-weight: 600; color: var(--muted); cursor: pointer;
         border: 0; background: transparent; transition: .2s; }
  .tab.active { color: #fff; background: linear-gradient(90deg, var(--brand), var(--brand-2)); }

  .card { background: var(--card); border-radius: var(--radius); padding: 22px;
          box-shadow: var(--shadow); margin-bottom: 18px; }
  .muted { color: var(--muted); font-size: 13px; }
  .hidden { display: none; }

  .drop { display: block; border: 2px dashed #d6d3ec; border-radius: 14px; padding: 34px 18px;
          text-align: center; cursor: pointer; transition: .2s; background: #fbfbff; }
  .drop:hover, .drop.over { border-color: var(--brand); background: var(--brand-soft); }
  .drop .icon { font-size: 38px; }
  .drop .big { font-size: 16px; font-weight: 600; margin: 8px 0 4px; }
  .drop input { display: none; }

  .stage { position: relative; display: inline-block; max-width: 100%;
           cursor: crosshair; touch-action: none; border-radius: 12px; overflow: hidden;
           box-shadow: 0 4px 16px rgba(0,0,0,.12); }
  .stage img { display: block; max-width: 100%; }
  .stage .box { position: absolute; border: 2px solid #fff;
                box-shadow: 0 0 0 2px var(--brand), 0 0 0 9999px rgba(20,16,40,.35);
                display: none; pointer-events: none; border-radius: 2px; }
  .stage .tip { position: absolute; inset: 0; display: flex; align-items: center;
                justify-content: center; pointer-events: none; }
  .stage .tip span { background: rgba(20,16,40,.6); color: #fff; padding: 8px 14px;
                     border-radius: 20px; font-size: 13px; backdrop-filter: blur(3px); }

  .opts { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0 4px; }
  .chip { display: inline-flex; align-items: center; gap: 7px; padding: 9px 14px;
          border: 1.5px solid var(--line); border-radius: 10px; cursor: pointer;
          font-size: 14px; transition: .15s; user-select: none; }
  .chip:hover { border-color: #cfc9f3; }
  .chip input { accent-color: var(--brand); margin: 0; }
  .chip.checked { border-color: var(--brand); background: var(--brand-soft); color: var(--brand); font-weight: 600; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
         width: 100%; margin-top: 16px; padding: 14px; font-size: 16px; font-weight: 600;
         color: #fff; border: 0; border-radius: 12px; cursor: pointer;
         background: linear-gradient(90deg, var(--brand), var(--brand-2));
         box-shadow: 0 8px 20px rgba(108, 92, 231, .3); transition: .15s; }
  .btn:hover:not(:disabled) { transform: translateY(-1px); }
  .btn:disabled { background: #d6d3ec; box-shadow: none; cursor: not-allowed; }
  .btn.ghost { background: #fff; color: var(--brand); border: 1.5px solid var(--brand);
               box-shadow: none; }

  .bar { height: 10px; background: var(--line); border-radius: 6px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0;
             background: linear-gradient(90deg, var(--brand), var(--brand-2)); transition: width .3s; }
  .status { font-size: 14px; margin-bottom: 10px; }
  .status.err { color: #e74c3c; }

  video, .result-img { max-width: 100%; border-radius: 12px; display: block; }
  /* 透明结果用棋盘格背景显示,方便看出真透明 */
  .checker { background-image:
      linear-gradient(45deg, #e6e6ef 25%, transparent 25%),
      linear-gradient(-45deg, #e6e6ef 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #e6e6ef 75%),
      linear-gradient(-45deg, transparent 75%, #e6e6ef 75%);
    background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    background-color: #fff; border-radius: 12px; padding: 6px; }
  .thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .thumbs img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px;
                box-shadow: 0 2px 6px rgba(0,0,0,.12); }
  .badge { display: inline-block; background: var(--ok); color: #fff; font-size: 13px;
           padding: 3px 10px; border-radius: 20px; }
  .row-h { display: flex; gap: 10px; }
  .row-h > * { flex: 1; }
  a.plain { text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>✨ 智能去水印</h1>
    <p>视频 / 图片皆可 · 框选水印一键去除 · 自动保留原音轨</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="video">🎬 视频</button>
    <button class="tab" data-tab="image">🖼️ 图片</button>
    <button class="tab" data-tab="bg">✂️ 去背景</button>
  </div>

  <!-- ============ 视频 ============ -->
  <section id="panel-video">
    <div class="card">
      <label class="drop" id="vdrop">
        <div class="icon">🎬</div>
        <div class="big">点击或拖入视频</div>
        <div class="muted">支持 mp4 / mov / mkv / webm 等,最大 200MB</div>
        <input type="file" id="vfile" accept="video/*">
      </label>
      <div class="muted" id="vhint" style="margin-top:12px;display:none"></div>
    </div>

    <div class="card hidden" id="veditor">
      <div class="muted" style="margin-bottom:12px">👇 在画面上 <b>按住拖动</b> 圈出水印(框比水印略大更干净,可重画)</div>
      <div class="stage" id="vstage">
        <img id="vframe" alt="视频首帧">
        <div class="box" id="vbox"></div>
        <div class="tip" id="vtip"><span>👆 在水印上拖一个框</span></div>
      </div>
      <div class="opts">
        <label class="chip checked"><input type="radio" name="vmethod" value="delogo" checked> 快速</label>
        <label class="chip"><input type="radio" name="vmethod" value="inpaint"> 高质量</label>
        <label class="chip"><input type="checkbox" id="vmotion"> 水印会移动</label>
      </div>
      <button class="btn" id="vgo" disabled>开始去水印</button>
    </div>

    <div class="card hidden" id="vprogress">
      <div class="status" id="vstatus">处理中…</div>
      <div class="bar"><i id="vbar"></i></div>
    </div>

    <div class="card hidden" id="vresult">
      <div style="margin-bottom:12px"><span class="badge">✓ 完成</span></div>
      <video id="vvideo" controls></video>
      <a class="plain" id="vdl" download><button class="btn" style="margin-top:14px">⬇️ 下载视频</button></a>
    </div>
  </section>

  <!-- ============ 图片 ============ -->
  <section id="panel-image" class="hidden">
    <div class="card">
      <label class="drop" id="idrop">
        <div class="icon">🖼️</div>
        <div class="big">点击或拖入图片</div>
        <div class="muted">支持 jpg / png / webp / bmp,最大 200MB</div>
        <input type="file" id="ifile" accept="image/*">
      </label>
      <div class="muted" id="ihint" style="margin-top:12px;display:none"></div>
    </div>

    <div class="card hidden" id="ieditor">
      <div class="muted" style="margin-bottom:12px">👇 在图片上 <b>按住拖动</b> 圈出水印(框比水印略大更干净,可重画)</div>
      <div class="stage" id="istage">
        <img id="iframe" alt="图片">
        <div class="box" id="ibox"></div>
        <div class="tip" id="itip"><span>👆 在水印上拖一个框</span></div>
      </div>
      <div class="opts">
        <label class="chip checked"><input type="radio" name="imethod" value="inpaint" checked> 高质量(推荐)</label>
        <label class="chip"><input type="radio" name="imethod" value="delogo"> 快速</label>
      </div>
      <button class="btn" id="igo" disabled>开始去水印</button>
    </div>

    <div class="card hidden" id="iresult">
      <div style="margin-bottom:12px"><span class="badge">✓ 完成</span> <span class="muted" id="istatus"></span></div>
      <img class="result-img" id="iout" alt="去水印结果">
      <div class="row-h">
        <a class="plain" id="idl" download><button class="btn" style="margin-top:14px">⬇️ 下载图片</button></a>
        <button class="btn ghost" id="iredo" style="margin-top:14px">重新框选</button>
      </div>
    </div>
  </section>

  <!-- ============ 去背景 ============ -->
  <section id="panel-bg" class="hidden">
    <div class="card">
      <label class="drop" id="bdrop">
        <div class="icon">✂️</div>
        <div class="big">点击或拖入图片(可多选批量)</div>
        <div class="muted">jpg / png / webp / bmp,可一次选多张</div>
        <input type="file" id="bfile" accept="image/*" multiple>
      </label>
      <div class="thumbs" id="bthumbs"></div>
      <div class="muted" id="bhint" style="margin-top:10px;display:none"></div>
    </div>

    <div class="card hidden" id="beditor">
      <div class="muted" style="margin-bottom:10px">处理方式</div>
      <div class="opts">
        <label class="chip checked"><input type="radio" name="bmode" value="ai" checked> 🤖 AI 智能去背景</label>
        <label class="chip"><input type="radio" name="bmode" value="checker"> 🩹 去假透明格子</label>
      </div>
      <div class="muted" style="margin:14px 0 6px">导出格式</div>
      <div class="opts">
        <label class="chip checked"><input type="radio" name="bexport" value="transparent" checked> 透明 PNG</label>
        <label class="chip"><input type="radio" name="bexport" value="white"> 白底 PNG</label>
      </div>
      <button class="btn" id="bgo">开始处理</button>
    </div>

    <div class="card hidden" id="bprogress">
      <div class="status" id="bstatus">处理中…</div>
      <div class="bar"><i id="bbar"></i></div>
    </div>

    <div class="card hidden" id="bresult">
      <div style="margin-bottom:12px"><span class="badge">✓ 完成</span> <span class="muted" id="bcount"></span></div>
      <div class="checker" id="bpreviewWrap"><img class="result-img" id="bout" alt="去背景结果"></div>
      <a class="plain" id="bdl" download><button class="btn" style="margin-top:14px" id="bdlbtn">⬇️ 下载</button></a>
    </div>
  </section>
</div>

<script>
const $ = (id) => document.getElementById(id);

// ---------- 标签切换 ----------
document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  t.classList.add("active");
  ["video", "image", "bg"].forEach(name =>
    $("panel-" + name).classList.toggle("hidden", t.dataset.tab !== name));
});

// ---------- chip 选中样式 ----------
function syncChips(name) {
  document.querySelectorAll(`input[name=${name}]`).forEach(inp => {
    inp.closest(".chip").classList.toggle("checked", inp.checked);
  });
}
document.querySelectorAll(".chip input").forEach(inp => inp.addEventListener("change", () => {
  if (inp.type === "radio") syncChips(inp.name);
  else inp.closest(".chip").classList.toggle("checked", inp.checked);
}));

// ---------- 通用:拖框选区 ----------
function makeDrawer(stage, img, box, tip, onReady) {
  let scale = 1, drawing = false, sx = 0, sy = 0, region = null;
  img.addEventListener("load", () => { scale = img.clientWidth / img.naturalWidth || 1; });
  const at = (ev) => {
    const r = stage.getBoundingClientRect();
    const p = ev.touches ? ev.touches[0] : ev;
    return { x: p.clientX - r.left, y: p.clientY - r.top };
  };
  const draw = (x, y, w, h) => {
    box.style.left = x + "px"; box.style.top = y + "px";
    box.style.width = w + "px"; box.style.height = h + "px";
  };
  const start = (ev) => { ev.preventDefault(); drawing = true; const p = at(ev);
    sx = p.x; sy = p.y; box.style.display = "block"; tip.style.display = "none"; draw(sx, sy, 0, 0); };
  const move = (ev) => { if (!drawing) return; ev.preventDefault(); const p = at(ev);
    draw(Math.min(p.x, sx), Math.min(p.y, sy), Math.abs(p.x - sx), Math.abs(p.y - sy)); };
  const end = () => {
    if (!drawing) return; drawing = false;
    const w = parseFloat(box.style.width), h = parseFloat(box.style.height);
    if (w < 8 || h < 8) { box.style.display = "none"; tip.style.display = "flex"; region = null; return; }
    const s = scale || 1;
    region = [Math.round(parseFloat(box.style.left) / s), Math.round(parseFloat(box.style.top) / s),
              Math.round(w / s), Math.round(h / s)];
    onReady(region);
  };
  stage.addEventListener("mousedown", start);
  window.addEventListener("mousemove", move);
  window.addEventListener("mouseup", end);
  stage.addEventListener("touchstart", start, { passive: false });
  stage.addEventListener("touchmove", move, { passive: false });
  stage.addEventListener("touchend", end);
  return {
    getRegion: () => region,
    reset: () => { box.style.display = "none"; tip.style.display = "flex"; region = null; }
  };
}

// ---------- 通用:拖放上传到 input ----------
function wireDrop(drop, input) {
  drop.addEventListener("dragover", e => { e.preventDefault(); drop.classList.add("over"); });
  drop.addEventListener("dragleave", () => drop.classList.remove("over"));
  drop.addEventListener("drop", e => {
    e.preventDefault(); drop.classList.remove("over");
    if (e.dataTransfer.files[0]) { input.files = e.dataTransfer.files;
      input.dispatchEvent(new Event("change", { bubbles: true })); }
  });
}

// ================= 视频流程 =================
const vDraw = makeDrawer($("vstage"), $("vframe"), $("vbox"), $("vtip"),
  () => { $("vgo").disabled = false; });
wireDrop($("vdrop"), $("vfile"));
let videoId = null;

$("vfile").addEventListener("change", async (e) => {
  const f = e.target.files[0]; if (!f) return;
  $("vhint").style.display = "block"; $("vhint").textContent = "上传中…";
  const fd = new FormData(); fd.append("file", f);
  try {
    const r = await fetch("/api/upload", { method: "POST", body: fd });
    if (!r.ok) throw new Error((await r.json()).detail || r.status);
    const d = await r.json();
    videoId = d.video_id; $("vframe").src = d.frame;
    $("vhint").textContent = `已上传:${d.width}×${d.height}${d.has_audio ? " · 含音轨" : ""}`;
    $("veditor").classList.remove("hidden");
    $("vresult").classList.add("hidden"); $("vgo").disabled = true; vDraw.reset();
  } catch (err) { $("vhint").textContent = "上传失败:" + err.message; }
});

$("vgo").addEventListener("click", async () => {
  const region = vDraw.getRegion(); if (!region) return;
  const method = document.querySelector("input[name=vmethod]:checked").value;
  const motion = $("vmotion").checked;
  $("vgo").disabled = true; $("vprogress").classList.remove("hidden");
  $("vresult").classList.add("hidden");
  $("vstatus").className = "status"; $("vstatus").textContent = motion ? "追踪并处理中…" : "处理中…";
  $("vbar").style.width = "0%";
  try {
    const r = await fetch("/api/process", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ video_id: videoId, regions: [region], method, motion, tracker: "template" })
    });
    if (!r.ok) throw new Error((await r.json()).detail || r.status);
    const { job_id } = await r.json();
    const timer = setInterval(async () => {
      const d = await (await fetch("/api/jobs/" + job_id)).json();
      $("vbar").style.width = (d.progress || 0) + "%";
      if (d.status === "done") { clearInterval(timer); $("vstatus").textContent = "完成!";
        const url = "/api/download/" + job_id; $("vvideo").src = url; $("vdl").href = url;
        $("vresult").classList.remove("hidden"); $("vgo").disabled = false; }
      else if (d.status === "error") { clearInterval(timer);
        $("vstatus").className = "status err"; $("vstatus").textContent = "失败:" + (d.error || "未知");
        $("vgo").disabled = false; }
    }, 1000);
  } catch (err) { $("vstatus").className = "status err"; $("vstatus").textContent = "出错:" + err.message;
    $("vgo").disabled = false; }
});

// ================= 图片流程 =================
const iDraw = makeDrawer($("istage"), $("iframe"), $("ibox"), $("itip"),
  () => { $("igo").disabled = false; });
wireDrop($("idrop"), $("ifile"));
let imageId = null;

$("ifile").addEventListener("change", async (e) => {
  const f = e.target.files[0]; if (!f) return;
  $("ihint").style.display = "block"; $("ihint").textContent = "上传中…";
  const fd = new FormData(); fd.append("file", f);
  try {
    const r = await fetch("/api/upload-image", { method: "POST", body: fd });
    if (!r.ok) throw new Error((await r.json()).detail || r.status);
    const d = await r.json();
    imageId = d.image_id; $("iframe").src = d.frame;
    $("ihint").textContent = `已上传:${d.width}×${d.height}`;
    $("ieditor").classList.remove("hidden");
    $("iresult").classList.add("hidden"); $("igo").disabled = true; iDraw.reset();
  } catch (err) { $("ihint").textContent = "上传失败:" + err.message; }
});

$("igo").addEventListener("click", async () => {
  const region = iDraw.getRegion(); if (!region) return;
  const method = document.querySelector("input[name=imethod]:checked").value;
  $("igo").disabled = true; $("igo").textContent = "处理中…";
  try {
    const r = await fetch("/api/process-image", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image_id: imageId, regions: [region], method, feather: 4 })
    });
    if (!r.ok) throw new Error((await r.json()).detail || r.status);
    const d = await r.json();
    $("iout").src = d.result_url + "?t=" + Date.now();
    $("idl").href = d.result_url;
    $("iresult").classList.remove("hidden");
  } catch (err) { alert("处理失败:" + err.message); }
  $("igo").disabled = false; $("igo").textContent = "开始去水印";
});

$("iredo").addEventListener("click", () => {
  $("iresult").classList.add("hidden"); iDraw.reset(); $("igo").disabled = true;
  $("ieditor").scrollIntoView({ behavior: "smooth" });
});

// ================= 去背景流程(批量) =================
wireDrop($("bdrop"), $("bfile"));
let bgFiles = [];

$("bfile").addEventListener("change", (e) => {
  bgFiles = Array.from(e.target.files || []);
  if (!bgFiles.length) return;
  $("bthumbs").innerHTML = "";
  bgFiles.slice(0, 12).forEach(f => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(f); $("bthumbs").appendChild(img);
  });
  $("bhint").style.display = "block";
  $("bhint").textContent = `已选择 ${bgFiles.length} 张图片`;
  $("beditor").classList.remove("hidden");
  $("bresult").classList.add("hidden");
});

$("bgo").addEventListener("click", async () => {
  if (!bgFiles.length) return;
  const mode = document.querySelector("input[name=bmode]:checked").value;
  const exp = document.querySelector("input[name=bexport]:checked").value;
  $("bgo").disabled = true;
  $("bprogress").classList.remove("hidden"); $("bresult").classList.add("hidden");
  $("bstatus").className = "status";
  $("bstatus").textContent = mode === "ai" ? "AI 抠图中(首次稍慢)…" : "处理中…";
  $("bbar").style.width = "0%";
  const fd = new FormData();
  bgFiles.forEach(f => fd.append("files", f));
  fd.append("mode", mode); fd.append("export", exp);
  try {
    const r = await fetch("/api/bg-process", { method: "POST", body: fd });
    if (!r.ok) throw new Error((await r.json()).detail || r.status);
    const { job_id, count } = await r.json();
    const timer = setInterval(async () => {
      const d = await (await fetch("/api/jobs/" + job_id)).json();
      $("bbar").style.width = (d.progress || 0) + "%";
      if (d.status === "done") {
        clearInterval(timer); $("bstatus").textContent = "完成!";
        const url = "/api/bg-download/" + job_id;
        $("bdl").href = url;
        if (count === 1) {
          $("bpreviewWrap").style.display = "block";
          $("bout").src = url + "?t=" + Date.now();
          $("bdlbtn").textContent = "⬇️ 下载 PNG";
          $("bcount").textContent = "";
        } else {
          $("bpreviewWrap").style.display = "none";
          $("bdlbtn").textContent = `⬇️ 下载全部(${count} 张 · ZIP)`;
          $("bcount").textContent = `共处理 ${count} 张`;
        }
        $("bresult").classList.remove("hidden"); $("bgo").disabled = false;
      } else if (d.status === "error") {
        clearInterval(timer); $("bstatus").className = "status err";
        $("bstatus").textContent = "失败:" + (d.error || "未知"); $("bgo").disabled = false;
      }
    }, 1000);
  } catch (err) {
    $("bstatus").className = "status err"; $("bstatus").textContent = "出错:" + err.message;
    $("bgo").disabled = false;
  }
});
